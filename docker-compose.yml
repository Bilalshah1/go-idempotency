version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"  

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bilal
      POSTGRES_PASSWORD: bilal123
      POSTGRES_DB: bilal
      POSTGRES_INITDB_ARGS: "-c password_encryption=md5"
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bilal"]
      interval: 10s
      timeout: 5s
      retries: 5